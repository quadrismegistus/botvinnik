name: botvinnik_mobile
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.12.2

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  chessground: ^10.1.1
  dartchess: ^0.13.1
  flutter_js: ^0.8.7
  stockfish: ^1.8.1
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5
  sqflite: ^2.4.3
  flutter_colorpicker: ^1.1.0
  sqflite_common_ffi_web: ^1.1.2
  url_launcher: ^6.3.2
  package_info_plus: ^10.2.1
  path_provider: ^2.1.5
  # SHA-256 verification of downloaded engine binaries (issue #183). Was already
  # present transitively; a direct dep because we depend on it directly now.
  crypto: ^3.0.6
  ffi: ^2.1.4
  onnxruntime: ^1.4.1
  # Getting data OUT (#138). No single package covers all three targets, so
  # lib/stores/files.dart picks per platform and these are what it picks
  # BETWEEN — see that file's header for why each branch is the one it is.
  #   file_selector — reading a backup back in, on all three; and the native
  #     save panel on macOS. flutter.dev's own package; openFile is the only
  #     API implemented everywhere including web, where it is an <input>.
  #   share_plus — iOS has no save panel, so the share sheet ("Save to
  #     Files…") is the system's file-out. Not used on web: its web branch is
  #     navigator.share, which Firefox desktop does not implement at all.
  #   web — the web branch writes its own Blob + <a download>, the same two
  #     lines the Svelte app used, because that is the only thing that works
  #     in every browser. package:web rather than dart:html so the wasm
  #     build keeps compiling.
  file_selector: ^1.1.0
  share_plus: ^13.2.1
  web: ^1.1.1
  # Getting data IN over the network (#134: import your games from lichess).
  # Already here as a transitive dependency; named directly because
  # lib/brain/lichess_import_api.dart imports it. dart:io's HttpClient does
  # not exist on web and package:web's fetch would need its own conditional
  # import — http covers both branches with one API, and its MockClient is
  # the seam the import tests answer at instead of calling lichess.
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    # the web app's pure-TS layer (bot, grading, explanations, practice
    # scheduling, roster) compiled to one IIFE — `npm run build:brain` in the
    # repo root rebuilds it and runs the node smoke + fixture replay
    - assets/brain.js
    # golden parity fixtures (regenerate deliberately: `npm run fixtures`;
    # the git diff of this file IS the behavior-change review)
    - assets/brain-fixtures.json
    # Maia's encode/decode for the embedded JS runtime, from the same
    # brain/maia/ sources the web worker uses (`npm run build:maia-brain`).
    # Read only when someone picks a Maia, and never on the web — which loads
    # brain.js by script tag and keeps Maia in its own lazy worker.
    - assets/maia-brain.js
    # the offline opening book: names (lichess/chess-openings) + move stats
    # counted from a public lichess database dump — see scripts/
    # build-openings.mts and build-book-from-dump.mts
    - assets/openings.json
    - assets/book.json
    # Garbochess-JS (2011, BSD-3) verbatim, for the isolate that runs it on
    # macOS/iOS. A COPY of static/garbo/, which is the vendored original the
    # web is served from — CI diffs the two, because two Garbos that drift are
    # two different opponents wearing one name. Its LICENSE must travel with
    # it, so the whole directory is bundled.
    - assets/garbo/
    # GPL-3.0 obligation: the licence text and third-party notices travel with
    # the binary and are reachable in-app (Settings → About). Copies of the
    # repo-root files, kept in sync by flutter/stage-legal.sh with a CI drift
    # guard — never edit these directly.
    - assets/legal/LICENSE
    - assets/legal/THIRD-PARTY-NOTICES.md
    # the robot-knight mark, for the app bar beside the wordmark. Black on
    # transparency ON PURPOSE: ImageIcon tints through the alpha channel, so
    # this one asset follows the theme instead of being baked a colour. Every
    # other icon in the repo is generated from the same master and flattened —
    # `python3 scripts/make-icons.py`, which owns this file too.
    - assets/roboknight.png

  # Roboto, bundled rather than fetched. Flutter web otherwise downloads its
  # default font from fonts.gstatic.com at runtime — a third-party request on
  # every cold load, and the last thing standing between this build and real
  # offline support. Apache-2.0, copied from the Flutter SDK's own
  # material_fonts artifacts; licence alongside the files.
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Medium.ttf
          weight: 500
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package

# Spike: dartchess with web support (64-bit bitboards split into 32-bit halves
# for the JS number type). Upstream targets native only. Perft-verified in
# both Chrome and the VM — see vendor/dartchess/test/web_perft_test.dart.
dependency_overrides:
  dartchess:
    path: ../vendor/dartchess
