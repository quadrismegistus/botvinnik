  <style>
    /* Painted before any Dart or CanvasKit arrives. Flutter's first frame
       covers it, then it fades out — so the user never sees a blank page. */
    #boot { position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px;
      background: #161512; color: #b9b6b0; z-index: 9999;
      font: 15px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      transition: opacity .35s ease; }
    #boot.done { opacity: 0; pointer-events: none; }
    /* the app icon, inlined so it paints with the HTML — no second request */
    #boot img { width: 112px; height: 112px; border-radius: 24px;
      box-shadow: 0 10px 34px rgba(0,0,0,.5);
      animation: breathe 2.6s ease-in-out infinite; }
    @keyframes breathe {
      0%,100% { transform: scale(1);    box-shadow: 0 10px 34px rgba(0,0,0,.5) }
      50%     { transform: scale(1.04); box-shadow: 0 14px 40px rgba(0,0,0,.6) }
    }
    #boot .bar { width: 168px; height: 3px; background: #2a2825;
      border-radius: 2px; overflow: hidden; }
    #boot .bar span { display: block; height: 100%; width: 30%;
      background: #81b64c; border-radius: 2px; animation: slide 1.3s ease-in-out infinite; }
    @keyframes slide { 0% { transform: translateX(-110%) } 100% { transform: translateX(370%) } }
    #boot p { margin: 0; font-size: 12.5px; color: #6f6c66; }
    @media (prefers-reduced-motion: reduce) {
      #boot img, #boot .bar span { animation: none }
    }
  </style>

  <script>
    // staged text: the engine and its network are the slow part, so say so
    // rather than showing a bar that pretends to know a percentage
    var _msg = document.getElementById('boot-msg');
    var _seen = false;
    try { _seen = localStorage.getItem('botvinnik-booted') === '1'; } catch (e) {}
    var _timers = [
      setTimeout(function () { if (_msg) _msg.textContent = 'starting the engine…'; }, 2500),
      setTimeout(function () {
        if (_msg && !_seen) _msg.textContent = 'first visit downloads the engine once…';
      }, 6000),
      // armed unconditionally: if Flutter dies BEFORE its first frame, no
      // event ever fires and the splash would otherwise sit here forever
      setTimeout(function () {
        if (_msg) _msg.textContent = 'still loading — if this persists, reload the page';
      }, 30000)
    ];
    function _hideBoot() {
      _timers.forEach(clearTimeout);
      try { localStorage.setItem('botvinnik-booted', '1'); } catch (e) {}
      var b = document.getElementById('boot');
      if (b) { b.classList.add('done'); setTimeout(function () { b.remove(); }, 400); }
    }
    // the app calls this once the engine, brain and database are up —
    // Flutter's first frame lands well before that and would hand over to a
    // bare spinner
    window.botvinnikReady = _hideBoot;
    // fallback: never trap the user behind the splash if boot dies silently
    window.addEventListener('flutter-first-frame', function () {
      setTimeout(_hideBoot, 20000);
    });
  </script>
