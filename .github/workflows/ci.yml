name: CI

on:
  push:
    branches: [main, develop, tauri]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run build
        env:
          BASE_PATH: /botvinnik

  web-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}
      - run: npx playwright install --with-deps chromium
      - name: Playwright e2e (built bundle)
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

  # The vendored dartchess fork. This matters even if you never touch web:
  # flutter/pubspec.yaml overrides the published package with this path, so
  # the fork is what ships in production iOS and Android builds.
  dartchess-fork:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vendor/dartchess
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - run: dart pub get
      - run: dart analyze lib
      - name: Native — the 64-bit int implementation
        run: dart test -x full_perft
      - name: Web — the 32-bit halves (headless Chrome is preinstalled)
        run: |
          dart test -p chrome \
            test/web_perft_test.dart test/square_set_test.dart \
            test/attacks_test.dart test/board_test.dart test/castles_test.dart \
            test/models_test.dart test/setup_test.dart test/debug_test.dart

  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Rebuild the brain (runs the smoke test and replays the fixtures)
        run: npm run build:brain
      # Maia's pure halves, bundled separately because brain.js is eager on the
      # web and the policy index is 1858 strings only a Maia ever reads
      - name: Rebuild Maia's native bundle
        run: npm run build:maia-brain
      # esbuild bundles both Maia entries without typechecking either, and
      # neither is reachable from the Svelte app, so `npm run check` never saw
      # them. This is the only thing that does.
      - name: Typecheck the Flutter app's own TypeScript
        run: npm run check:flutter-ts
      - name: The committed bundles must match their TypeScript sources
        run: git diff --exit-code flutter/assets/brain.js flutter/assets/maia-brain.js
      # the bundled licence texts must match the repo-root originals, or the
      # app ships a stale licence — a real GPL-compliance defect, not a nit
      - name: Bundled licence texts must match root
        run: ./stage-legal.sh && git diff --exit-code assets/legal/
        working-directory: flutter
      - run: flutter pub get
        working-directory: flutter
      # integration_test/ is analyzed but never run: it drives a real app on a
      # device and CI has none. Analyzing it still catches the cheap failure —
      # a renamed method it calls, which would otherwise leave CI green.
      - run: flutter analyze lib test integration_test
        working-directory: flutter
      - run: flutter test
        working-directory: flutter
      # Also the only thing that type-checks the web branch of every
      # conditional import. Via build-web.sh rather than `flutter build web`
      # so the service worker's manifest is generated and its own guards run
      # (missing required file, unsubstituted bootstrap token). Note it cannot
      # catch an UNPROCESSED sw.js — it is the step that processes it; what
      # protects against that is every build path going through this script.
      - name: Web build, with the offline manifest
        working-directory: flutter
        run: ./build-web.sh
      # The only tests that run the Flutter app in a browser. They matter most
      # for retro, whose every failure path is a silent fallback to Stockfish:
      # a broken retro persona still plays, as somebody else, so nothing short
      # of watching the worker boot catches it.
      #
      # The config's webServer builds again rather than reusing the step above.
      # Deliberate: it keeps `npx playwright test -c flutter/...` a one-liner
      # locally, and a build failure reports as a build failure there rather
      # than as a mysterious server timeout here.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}
      - run: npx playwright install --with-deps chromium
      # --grep-invert @network skips the two Maia tests that download ~3.5MB
      # of weights from HuggingFace. Those weights are GPL-3.0 and deliberately
      # not redistributed with the app, so reaching the network on first use is
      # a permanent property of that family rather than a test-environment
      # quirk — and not one worth making CI's uptime depend on. What DOES run
      # here is the guard that matters most: that a non-Maia game makes no
      # third-party request at all.
      - name: Flutter web e2e (engine workers, in a real browser)
        run: npx playwright test -c flutter/playwright.config.ts --grep-invert "@network"
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: flutter-playwright-traces
          path: flutter/test-results/
          retention-days: 7
