name: Tauri e2e

# tauri-driver has no macOS backend, so the desktop shell's end-to-end test
# lives here on Linux: build the app with a Linux stockfish sidecar, drive
# the real window over WebDriver, assert the native analysis reaches the UI.
# PARKED: Flutter owns desktop now (flutter/, macOS build). The Tauri shell
# is preserved but no longer built on every push — run this manually if you
# revive it. See docs/desktop.md.
on:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install system deps (webkit, driver, xvfb, stockfish)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            webkit2gtk-driver xvfb stockfish

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: svelte/src-tauri

      - name: Cache tauri-driver
        id: driver-cache
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/tauri-driver
          key: tauri-driver-v1

      - name: Install tauri-driver
        if: steps.driver-cache.outputs.cache-hit != 'true'
        run: cargo install tauri-driver --locked

      - name: Stage engine sidecars
        run: |
          mkdir -p svelte/src-tauri/binaries
          cp "$(which stockfish)" svelte/src-tauri/binaries/stockfish-x86_64-unknown-linux-gnu
          # externalBin entries are REQUIRED at build time. The e2e never
          # exercises dala, so lc0 is a stub; if it were ever spawned it exits
          # immediately -> engine-exit -> dala falls back to Stockfish with
          # the stand-in flag, which is the designed degradation.
          cp "$(which true)" svelte/src-tauri/binaries/lc0-x86_64-unknown-linux-gnu

      - run: npm ci

      - name: Rust unit tests
        run: cargo test --manifest-path svelte/src-tauri/Cargo.toml

      # The release build's embedded-asset navigation stalls at about:blank on
      # these runners (works on macOS locally) — so e2e runs the debug binary
      # against a vite dev server, mirroring the local `tauri dev` setup.
      - name: Build app (debug loads devUrl)
        run: cargo build --manifest-path svelte/src-tauri/Cargo.toml

      - name: Start dev server
        run: |
          npm run dev -- --port 5174 --strictPort &
          for i in $(seq 1 60); do
            curl -sf http://localhost:5174/ > /dev/null && break
            sleep 1
          done
          curl -sf http://localhost:5174/ > /dev/null

      - name: Run e2e under xvfb
        env:
          WEBKIT_DISABLE_COMPOSITING_MODE: '1'
          WEBKIT_DISABLE_DMABUF_RENDERER: '1'
          TAURI_APP: svelte/src-tauri/target/debug/app
        run: xvfb-run --auto-servernum node scripts/e2e-tauri.mjs
